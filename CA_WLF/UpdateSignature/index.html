<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>软件签名证书 - UpdateSignature</title>
    <style>
        /* 页面整体样式 */
        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background-color: #f0f2f5; 
            margin: 0; 
            padding: 40px 20px; 
            display: flex; 
            justify-content: center; 
        }
        /* 卡片容器 */
        .cert-container { 
            background: #ffffff; 
            max-width: 600px; 
            width: 100%; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            overflow: hidden; 
            border: 1px solid #e1e4e8;
        }
        /* 顶部蓝色条 */
        .header { 
            background: #2c3e50; 
            color: white; 
            padding: 20px; 
            text-align: center; 
        }
        .header h1 { margin: 0; font-size: 20px; letter-spacing: 1px; }
        
        /* 内容区域 */
        .content { padding: 30px; }
        .section-title { 
            font-size: 14px; 
            color: #7f8c8d; 
            text-transform: uppercase; 
            margin-bottom: 15px; 
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
        }
        
        /* 证书详情行 */
        .info-group { margin-bottom: 20px; }
        .label { font-size: 13px; color: #95a5a6; display: block; margin-bottom: 4px; }
        .value { font-size: 16px; color: #2c3e50; font-weight: 500; word-break: break-all; }
        .highlight { color: #e67e22; font-weight: bold; }
        
        /* 状态标签 */
        .status-badge {
            display: inline-block;
            background: #27ae60;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        /* 底部按钮 */
        .footer { 
            background: #f8f9fa; 
            padding: 20px; 
            text-align: center; 
            border-top: 1px solid #eee;
        }
        .btn {
            background: #3498db;
            color: white;
            padding: 10px 25px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn:hover { background: #2980b9; }
    </style>
</head>
<body>

<div class="cert-container">
    <div class="header">
        <h1>代码签名证书详情</h1>
    </div>

    <div class="content">
        <div class="section-title">颁发信息</div>
        
        <div class="info-group">
            <span class="label">颁发给 (Subject)</span>
            <span class="value highlight">UpdateSignature</span>
        </div>

        <div class="info-group">
            <span class="label">颁发机构 (Issuer)</span>
            <span class="value">WLF Certificate Authority</span>
        </div>

        <div class="section-title">安全详情</div>

        <div class="info-group">
            <span class="label">证书类型</span>
            <span class="value">Code Signing Certificate (代码签名)</span>
        </div>

        <div class="info-group">
            <span class="label">当前状态</span>
            <span class="status-badge">✓ 已验证 (VALID)</span>
        </div>

        <div class="info-group">
            <span class="label">SHA-1 指纹</span>
            <span class="value" style="font-family: monospace; font-size: 14px;">
                D5:23:B0:12:58:A5:D2:14:42:DA:54:2D:07:BA:8A:B1:AF:43:61:0E
            </span>
        </div>
    </div>

    <div class="footer">
        <a href="CA_WLF_Intermediate.crt" class="btn">下载公钥证书 (.CER)</a>
    </div>
</div>

</body>
</html>
